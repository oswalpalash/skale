apiVersion: v1
kind: Namespace
metadata:
  name: skale-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: skale-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: skale-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-api
        app.kubernetes.io/part-of: skale-demo
    spec:
      containers:
        - name: checkout-api
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkout-api-hpa
  namespace: skale-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout-api
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: skale.io/v1alpha1
kind: PredictiveScalingPolicy
metadata:
  name: checkout-api-predictive
  namespace: skale-demo
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout-api
  mode: recommendationOnly
  forecastHorizon: 30m
  forecastSeasonality: 2h
  warmup:
    estimatedReadyDuration: 30m
  targetUtilization: 0.8
  confidenceThreshold: 0.65
  minReplicas: 2
  maxReplicas: 4
  cooldownWindow: 30m
  nodeHeadroomSanity: disabled
