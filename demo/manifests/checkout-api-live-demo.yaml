apiVersion: v1
kind: Namespace
metadata:
  name: skale-live-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: skale-live-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: skale-live-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-api
        app.kubernetes.io/part-of: skale-live-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: checkout-api
          image: python:3.12-alpine
          command:
            - python
            - -u
            - -c
          args:
            - |
              import hashlib
              import os
              import threading
              from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

              requests_total = 0
              lock = threading.Lock()
              loops = 60000
              namespace = os.environ.get("POD_NAMESPACE", "skale-live-demo")
              deployment = "checkout-api"

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      global requests_total
                      if self.path == "/ready":
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"ready")
                          return
                      if self.path == "/metrics":
                          with lock:
                              total = requests_total
                          body = (
                              "# HELP skale_demo_requests_total Total demo HTTP requests.\n"
                              "# TYPE skale_demo_requests_total counter\n"
                              f"skale_demo_requests_total{{namespace=\"{namespace}\",deployment=\"{deployment}\"}} {total}\n"
                          ).encode()
                          self.send_response(200)
                          self.send_header("Content-Type", "text/plain; version=0.0.4")
                          self.send_header("Content-Length", str(len(body)))
                          self.end_headers()
                          self.wfile.write(body)
                          return

                      data = b"skale-live-demo"
                      for _ in range(loops):
                          data = hashlib.sha256(data).digest()

                      with lock:
                          requests_total += 1

                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"ok")

                  def log_message(self, format, *args):
                      return

              ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 75
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: skale-live-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: skale-live-demo
spec:
  selector:
    app.kubernetes.io/name: checkout-api
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkout-api-hpa
  namespace: skale-live-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout-api
  minReplicas: 2
  maxReplicas: 6
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      selectPolicy: Max
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: skale.io/v1alpha1
kind: PredictiveScalingPolicy
metadata:
  name: checkout-api-predictive
  namespace: skale-live-demo
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout-api
  mode: recommendationOnly
  forecastHorizon: 2m
  forecastContextWindow: 168h
  forecastContextStep: 5m
  recentContextWindow: 2h
  recentContextStep: 10s
  forecastSeasonality: 6m
  warmup:
    estimatedReadyDuration: 90s
  targetUtilization: 0.8
  confidenceThreshold: 0.65
  minReplicas: 2
  maxReplicas: 6
  cooldownWindow: 2m
  nodeHeadroomSanity: disabled
