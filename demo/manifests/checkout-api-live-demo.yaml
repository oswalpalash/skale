apiVersion: v1
kind: Namespace
metadata:
  name: skale-live-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: skale-live-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: skale-live-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-api
        app.kubernetes.io/part-of: skale-live-demo
    spec:
      containers:
        - name: checkout-api
          image: python:3.12-alpine
          command:
            - python
            - -u
            - -c
          args:
            - |
              import hashlib
              import threading
              from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

              requests_total = 0
              lock = threading.Lock()
              loops = 180000

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      global requests_total
                      if self.path == "/ready":
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"ready")
                          return

                      data = b"skale-live-demo"
                      for _ in range(loops):
                          data = hashlib.sha256(data).digest()

                      with lock:
                          requests_total += 1

                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"ok")

                  def log_message(self, format, *args):
                      return

              ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 75
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: skale-live-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: skale-live-demo
spec:
  selector:
    app.kubernetes.io/name: checkout-api
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkout-api-hpa
  namespace: skale-live-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: skale.io/v1alpha1
kind: PredictiveScalingPolicy
metadata:
  name: checkout-api-predictive
  namespace: skale-live-demo
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout-api
  mode: recommendationOnly
  forecastHorizon: 2m
  forecastSeasonality: 6m
  warmup:
    estimatedReadyDuration: 90s
  targetUtilization: 0.8
  confidenceThreshold: 0.65
  minReplicas: 2
  maxReplicas: 6
  cooldownWindow: 2m
  nodeHeadroomSanity: disabled
