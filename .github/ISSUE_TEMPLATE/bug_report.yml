name: Bug report
description: Report a reproducible defect in controller, replay, or reporting behavior.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior and why it is incorrect.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, manifests, replay input, or PromQL details needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: Include commit, Go version, Kubernetes version, and whether this was demo, replayctl, or live controller mode.
