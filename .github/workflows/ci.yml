name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test-ci

      - name: Verify CRD generation
        run: |
          make manifests
          git diff --exit-code -- config/crd/bases

      - name: Validate shell scripts
        run: bash -n hack/*.sh

      - name: Build controller image
        run: docker build -t ghcr.io/oswalpalash/skale-controller:ci .

  publish-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        run: |
          echo "build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/oswalpalash/skale-controller
          tags: |
            type=raw,value=main
            type=raw,value=sha-${{ steps.prep.outputs.short_sha }}

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=main
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
