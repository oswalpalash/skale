apiVersion: apps/v1
kind: Deployment
metadata:
  name: skale-controller
  namespace: skale-system
  labels:
    app.kubernetes.io/name: skale-controller
    app.kubernetes.io/part-of: skale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skale-controller
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
      labels:
        app.kubernetes.io/name: skale-controller
        app.kubernetes.io/part-of: skale
    spec:
      serviceAccountName: skale-controller
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: ghcr.io/oswalpalash/skale-controller:main
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --dashboard-bind-address=:8082
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: probes
            - containerPort: 8082
              name: dashboard
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
