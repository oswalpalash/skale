apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: skale-controller
rules:
  - apiGroups:
      - skale.io
    resources:
      - predictivescalingpolicies
      - predictivescalingpolicies/status
      - predictivescalingpolicies/finalizers
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - nodes
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
