apiVersion: skale.io/v1alpha1
kind: PredictiveScalingPolicy
metadata:
  name: checkout-api-predictive
  namespace: skale-demo
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout-api
  mode: recommendationOnly
  forecastHorizon: 5m
  # Optional. Omit when no evidence-backed recurring period is known; the
  # controller will report detected seasonality or non-seasonal mode.
  forecastSeasonality: 20m
  warmup:
    estimatedReadyDuration: 45s
  targetUtilization: 0.8
  confidenceThreshold: 0.7
  minReplicas: 2
  maxReplicas: 8
  cooldownWindow: 5m
  nodeHeadroomSanity: requireForScaleUp
